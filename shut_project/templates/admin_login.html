{% extends "base.html" %}

{% block title %}כניסת אדמין{% endblock %}
{% block body_class %}theme-admin theme-auth{% endblock %}

{% block content %}
<section class="panel narrow auth-panel reveal">
  <div class="panel-heading">
    <div>
      <span class="eyebrow">Secure Access</span>
      <h2>כניסת אדמין</h2>
    </div>
    <p class="muted">גישה לניהול דיווחים, התאמות חשודות ותיקוני תשובות.</p>
  </div>
  {% if error %}
  <p class="status error">{{ error }}</p>
  {% endif %}
  <form method="post" action="{{ url_for('admin.admin_login') }}" class="form">
    <label>שם משתמש</label>
    <input type="text" name="username" class="input">
    <label>סיסמה</label>
    <input type="password" name="password" class="input">
    <button type="submit" class="button">התחבר</button>
  </form>
</section>
{% endblock %}
